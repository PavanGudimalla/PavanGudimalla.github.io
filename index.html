<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pavan Kumar Gudimalla | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .typing-cursor { display: inline-block; width: 2px; height: 1em; background-color: #6366f1; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #6366f1; }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <section id="skills" class="py-20 bg-gray-800/50">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 reveal">
            <h2 class="text-3xl md:text-4xl font-bold text-center text-white mb-16 tracking-wide uppercase text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Technical Skills</h2>
            <div class="max-w-4xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
                <div class="p-4 bg-gray-900 rounded-lg border border-gray-700">Python</div>
                <div class="p-4 bg-gray-900 rounded-lg border border-gray-700">SQL</div>
                <div class="p-4 bg-gray-900 rounded-lg border border-gray-700">Tableau</div>
                <div class="p-4 bg-gray-900 rounded-lg border border-gray-700">R</div>
                <div class="p-4 bg-gray-900 rounded-lg border border-gray-700">AWS</div>
                <div class="p-4 bg-gray-900 rounded-lg border border-gray-700">Azure</div>
                <div class="p-4 bg-gray-900 rounded-lg border border-gray-700">Excel</div>
                <div class="p-4 bg-gray-900 rounded-lg border border-gray-700">ETL Pipelines</div>
            </div>
        </div>
    </section>

    <section id="contact" class="py-20">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 reveal">
            <h2 class="text-3xl md:text-4xl font-bold text-center text-white mb-8 uppercase text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Get In Touch</h2>
            <div class="max-w-lg mx-auto bg-gray-800 p-8 rounded-2xl border border-gray-700">
                <form id="contact-form" action="https://formspree.io/f/xqalwdjq" method="POST" class="space-y-6">
                    <input type="text" name="name" placeholder="Your Name" required class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white">
                    <input type="email" name="email" placeholder="Your Email" required class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white">
                    <textarea name="message" rows="4" placeholder="Your Message" required class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white"></textarea>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg transition-all">Send Message</button>
                </form>
                <div id="form-status" class="mt-4 text-center"></div>
            </div>
        </div>
    </section>

    <script>
        // Form submission handler
        const contactForm = document.getElementById('contact-form');
        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            fetch(contactForm.action, { method: 'POST', body: new FormData(contactForm), headers: { 'Accept': 'application/json' } })
                .then(() => {
                    document.getElementById('form-status').textContent = "Thank you! Your message has been sent.";
                    contactForm.reset();
                });
        });
        // (Include your previous project generation and observer scripts here)
    </script>
</body>
</html>
